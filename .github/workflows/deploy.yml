name: Deploy Amethyst to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web Frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: pnpm --filter web build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: amethyst-api
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f apps/api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy Frontend to S3
        run: |
          aws s3 sync apps/web/dist s3://amethyst-web-prod --delete

      - name: Trigger App Runner Deployment
        env:
          APP_RUNNER_SERVICE_NAME: amethyst-api-prod
        run: |
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='${APP_RUNNER_SERVICE_NAME}'].ServiceArn | [0]" --output text)
          
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "Error: App Runner service '${APP_RUNNER_SERVICE_NAME}' not found."
            exit 1
          fi

          echo "Found Service ARN: $SERVICE_ARN"

          # Wait up to 5 minutes for any existing operations to finish
          for i in {1..10}; do
            STATUS=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" --query "Service.Status" --output text)
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Service is RUNNING. Starting deployment..."
              aws apprunner start-deployment --service-arn "$SERVICE_ARN"
              exit 0
            fi
            echo "Service is currently $STATUS. Waiting 30s before retry ($i/10)..."
            sleep 30
          done

          echo "Error: Service did not return to RUNNING state in time."
          exit 1
